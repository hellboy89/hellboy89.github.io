<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Cara ou Coroa — Deixa o destino decidir</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Cara ou Coroa</h1>
      <p class="tagline">
        Com dúvida? <strong>Deixa o destino decidir.</strong><br>
        Uma moeda, uma resposta, zero arrependimento.
      </p>
    </div>

    <!-- Moeda 3D -->
    <div class="coin-wrapper" onclick="jogar()" title="Clique para jogar">
      <div class="coin" id="coin">
        <div class="coin-face front">😊</div>
        <div class="coin-face back">👑</div>
      </div>
    </div>

    <!-- Resultado -->
    <div class="result-display">
      <div class="result-text" id="resultText"></div>
      <div class="result-message" id="resultMsg"></div>
    </div>

    <!-- Botão -->
    <button class="btn-jogar" id="btnJogar" onclick="jogar()">
      Jogar
    </button>

    <p style="font-size:0.75rem;color:#555;margin-top:-12px;">
      ou pressione <kbd style="background:#222;border:1px solid #444;border-radius:4px;padding:1px 6px;color:#aaa;">Espaço</kbd>
    </p>

    <!-- Streak -->
    <div class="streak-badge" id="streakBadge"></div>

    <!-- Estatísticas -->
    <div class="stats-card">
      <div class="stats-title">Placar da sessão</div>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-value cara" id="statCara">0</span>
          <span class="stat-label">😊 Cara</span>
        </div>
        <div class="stat-item">
          <span class="stat-value total" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-item">
          <span class="stat-value coroa" id="statCoroa">0</span>
          <span class="stat-label">👑 Coroa</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill-cara" id="progressCara"></div>
      </div>
    </div>

    <!-- Histórico -->
    <div class="history-card">
      <div class="history-header">
        <span class="history-title">Histórico recente</span>
        <button class="btn-clear" onclick="clearHistory()">Zerar</button>
      </div>
      <div class="history-list" id="historyList">
        <span class="history-empty">Nenhum resultado ainda...</span>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
